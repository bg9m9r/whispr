name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build-client:
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            runner: windows-latest
            archive: zip
          - rid: linux-x64
            runner: ubuntu-24.04
            archive: tar.gz
          - rid: osx-x64
            runner: macos-14
            archive: tar.gz
          - rid: osx-arm64
            runner: macos-14
            archive: tar.gz
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish Client
        run: dotnet publish src/Whispr.Client/Whispr.Client.csproj -c Release -r ${{ matrix.rid }} --self-contained -o publish -p:Version=${{ steps.version.outputs.version }}

      - name: Sign Windows executables
        if: matrix.archive == 'zip'
        env:
          PFX_BASE64: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 }}
          PFX_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PFX_PASSWORD }}
        run: |
          if ([string]::IsNullOrEmpty($env:PFX_BASE64)) { Write-Host "Skipping code signing (no certificate configured)"; exit 0 }
          $pfxPath = Join-Path $env:TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:PFX_BASE64))
          try {
            $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
            if (-not $signtool) { throw "signtool.exe not found" }
            Get-ChildItem -Path publish -Include *.exe,*.dll -Recurse | ForEach-Object {
              & $signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /f $pfxPath /p $env:PFX_PASSWORD $_.FullName
            }
          } finally {
            Remove-Item -Path $pfxPath -Force -ErrorAction SilentlyContinue
          }

      - name: Archive (Windows)
        if: matrix.archive == 'zip'
        run: |
          Compress-Archive -Path publish\* -DestinationPath whispr-client-${{ steps.version.outputs.version }}-${{ matrix.rid }}.zip

      - name: Archive (Linux/macOS)
        if: matrix.archive == 'tar.gz'
        run: |
          tar czf whispr-client-${{ steps.version.outputs.version }}-${{ matrix.rid }}.tar.gz -C publish .
          rm -rf publish

      - name: Upload artifact (Windows)
        if: matrix.archive == 'zip'
        uses: actions/upload-artifact@v4
        with:
          name: client-${{ matrix.rid }}
          path: whispr-client-${{ steps.version.outputs.version }}-${{ matrix.rid }}.zip

      - name: Upload artifact (Linux/macOS)
        if: matrix.archive == 'tar.gz'
        uses: actions/upload-artifact@v4
        with:
          name: client-${{ matrix.rid }}
          path: whispr-client-${{ steps.version.outputs.version }}-${{ matrix.rid }}.tar.gz

  build-server:
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            runner: windows-latest
            archive: zip
          - rid: linux-x64
            runner: ubuntu-24.04
            archive: tar.gz
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish Server
        run: dotnet publish src/Whispr.Server/Whispr.Server.csproj -c Release -r ${{ matrix.rid }} --self-contained -o publish -p:Version=${{ steps.version.outputs.version }}

      - name: Archive (Windows)
        if: matrix.archive == 'zip'
        run: |
          Compress-Archive -Path publish\* -DestinationPath whispr-server-${{ steps.version.outputs.version }}-${{ matrix.rid }}.zip

      - name: Archive (Linux/macOS)
        if: matrix.archive == 'tar.gz'
        run: |
          tar czf whispr-server-${{ steps.version.outputs.version }}-${{ matrix.rid }}.tar.gz -C publish .
          rm -rf publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.rid }}
          path: whispr-server-${{ steps.version.outputs.version }}-${{ matrix.rid }}.${{ matrix.archive == 'zip' && 'zip' || 'tar.gz' }}

  build-docker:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=v${{ github.event.inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    needs: [build-client, build-server]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "TAG_NAME=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            echo "TAG_NAME=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Download client artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: client-*

      - name: Download server artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: server-*

      - name: Flatten artifacts
        run: |
          mkdir -p release
          for d in artifacts/*/; do
            for f in "$d"*; do
              [ -f "$f" ] && cp "$f" release/
            done
          done
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG_NAME }}
          name: Release ${{ steps.version.outputs.VERSION }}
          draft: false
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
